<!doctype html>
<html lang="cs">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Tomáš Němec</title>
    <meta name="description" content="Tomáš Němec">
    <meta name="robots" content="noindex, nofollow">
    <meta name="theme-color" content="#07090d">
    <link rel="icon" href="favicon.png" sizes="512x512" type="image/png">
    <link rel="apple-touch-icon" href="assets/apple-touch-icon.png">
    <style>
      :root { color-scheme: dark; }
      * { box-sizing: border-box; }
      body {
        display: grid;
        min-height: 100svh;
        margin: 0;
        place-items: center;
        background: radial-gradient(circle at 50% 42%, rgba(247, 147, 26, 0.16), transparent 24rem), linear-gradient(180deg, #080b10 0%, #05070a 100%);
        color: #f7f2ea;
        font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      }
      main { display: grid; justify-items: center; gap: 22px; padding: 32px; text-align: center; }
      img { width: 78px; height: 78px; border-radius: 50%; box-shadow: 0 0 0 1px rgba(247, 147, 26, 0.38), 0 22px 80px rgba(247, 147, 26, 0.16); }
      h1 { margin: 0; font-size: 3.8rem; font-weight: 950; line-height: 1; letter-spacing: 0; }
      @media (max-width: 520px) { h1 { font-size: 2.7rem; } }
    </style>
  </head>
  <body>
    <main aria-label="Tomáš Němec">
      <img src="assets/tomasbtc-logo-round.png" alt="">
      <h1>Tomáš Němec</h1>
    </main>
    <script src="script.js"></script>
  </body>
</html>
